name: Recipe CI

on:
  pull_request:
    branches: [main]
    paths:
      - "src/recipes/**"
      - "src/schemas/**"
      - "scripts/validate-recipes.mjs"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/recipe-ci.yml"
  push:
    branches: [main]
    paths:
      - "src/recipes/**"
      - "src/schemas/**"
      - "scripts/validate-recipes.mjs"

jobs:
  validate-recipes:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate recipe JSON
        run: npm run validate:recipes

      - name: Build app
        run: npm run build
